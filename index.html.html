<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トレカ交換管理</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafaf8;--surface:#fff;--surface2:#f4f3ef;
  --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.2);
  --text:#1a1a18;--text2:#6b6a65;--text3:#a09f9a;
  --pink:#D4537E;--pink-l:#FBEAF0;--pink-d:#72243E;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-d:#085041;
  --r:10px;--rl:14px;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#1a1a18;--surface:#242421;--surface2:#2e2e2b;
  --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
  --text:#f0efe9;--text2:#9a9990;--text3:#6a6965;
  --pink-l:#3a1525;--pink-d:#F4C0D1;
  --teal-l:#0a2e22;--teal-d:#9FE1CB;
}}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}


.panel{display:none;padding:16px 14px 80px}
.panel.on{display:block}
/* 下部ナビゲーションバー */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--surface);
  border-top:1px solid var(--border);
  display:flex;
  z-index:500;
  padding-bottom:env(safe-area-inset-bottom);
  box-shadow:0 -2px 12px rgba(0,0,0,0.07);
}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;padding:8px 4px 10px;border:none;background:transparent;
  cursor:pointer;color:var(--text3);transition:color .15s;
  font-size:10px;font-weight:600;letter-spacing:.02em;
  -webkit-tap-highlight-color:transparent;
}
.bnav-btn.on{color:var(--pink)}
.bnav-btn svg{flex-shrink:0;transition:stroke .15s;}


/* グッズ管理 */
.toolbar{display:flex;gap:7px;margin-bottom:11px;flex-wrap:wrap;align-items:center}
.ulbl{padding:6px 13px;font-size:12px;font-weight:500;cursor:pointer;border:1px dashed var(--border2);border-radius:var(--r);background:var(--surface2);color:var(--text2);display:flex;align-items:center;gap:4px;transition:all .15s}
.ulbl:hover{border-color:var(--pink);color:var(--pink)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:9px}
.card{border:1px solid var(--border);border-radius:var(--rl);overflow:visible;background:var(--surface);transition:border-color .15s,transform .1s;position:relative}
.card:hover{border-color:var(--border2);transform:translateY(-1px)}
.card-img-wrap{width:100%;aspect-ratio:3/4;background:var(--surface2);border-radius:var(--rl) var(--rl) 0 0;position:relative;overflow:hidden;cursor:pointer}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none}
.stamp-layer{position:absolute;inset:0;pointer-events:none}
.stamp-dot{position:absolute;transform:translate(-50%,-50%);font-size:24px;line-height:1;user-select:none}
.card-foot{padding:5px 6px;font-size:11px;color:var(--text2);border-top:1px solid var(--border);display:flex;align-items:center;gap:4px}
.card-name-txt{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.card-del-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 3px;flex-shrink:0;line-height:1;transition:color .15s}
.card-del-btn:hover{color:#E24B4A}
.card-del-badge{position:absolute;top:-7px;left:-7px;z-index:10;width:22px;height:22px;border-radius:50%;background:#E24B4A;color:#fff;border:2px solid var(--bg);font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;transition:transform .15s,background .15s}
.card-del-badge:hover{transform:scale(1.15);background:#c0392b}
/* 「まとめ」ボタン — 左下 */
.memo-badge{position:absolute;top:-5px;right:-5px;min-width:17px;height:17px;background:var(--pink);color:#fff;border-radius:20px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 3px;z-index:2;border:2px solid var(--bg)}
.memo-badge.hide{display:none}
.empty{text-align:center;padding:36px 14px;color:var(--text3);font-size:13px}
.empty i{font-size:30px;display:block;margin-bottom:7px}

/* カード詳細 */
.detail-card-header{display:flex;align-items:center;gap:11px;padding:13px 0 11px;border-bottom:1px solid var(--border);margin-bottom:13px}
.detail-thumb{width:46px;height:62px;border-radius:7px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;background:var(--surface2)}
.detail-card-name{font-size:15px;font-weight:600}
.detail-card-count{font-size:12px;color:var(--text3);margin-top:2px}

/* 2段アコーディオン */
.date-group{border:1px solid var(--border);border-radius:var(--rl);background:var(--surface);overflow:hidden;margin-bottom:8px}
.date-group-hd{display:flex;align-items:center;gap:8px;padding:11px 13px;cursor:pointer;user-select:none;transition:background .12s}
.date-group-hd:hover{background:var(--surface2)}
.dghd-icon{font-size:14px;color:var(--pink);flex-shrink:0}
.dghd-date{font-size:13px;font-weight:700;color:var(--text);flex:1}
.dghd-live{font-size:11px;color:var(--text2);font-weight:400;margin-left:4px}
.dghd-count{font-size:11px;color:var(--text3);flex-shrink:0;background:var(--surface2);padding:2px 8px;border-radius:20px;font-weight:600}
.dghd-chev{font-size:15px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.dghd-chev.open{transform:rotate(180deg)}
.date-group-body{display:none;border-top:1px solid var(--border)}
.date-group-body.open{display:block}
.person-row{border-bottom:1px solid var(--border);overflow:hidden}
.person-row:last-child{border-bottom:none}
.person-row-hd{display:flex;align-items:center;gap:7px;padding:9px 13px 9px 20px;cursor:pointer;user-select:none;transition:background .12s}
.person-row-hd:hover{background:var(--surface2)}
.prhd-name{font-size:13px;font-weight:600;color:var(--text);flex:1}
.prhd-uid{font-size:11px;color:var(--text2)}
.prhd-pill{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:600;flex-shrink:0}
.prhd-chev{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.prhd-chev.open{transform:rotate(180deg)}
.person-detail{display:none;padding:4px 13px 13px 20px;background:var(--surface2)}
.person-detail.open{display:block}

/* メモ本文 */
.memo-actions{display:flex;gap:5px;align-items:center;margin:8px 0 7px;flex-wrap:wrap}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500}
.p-ongoing{background:var(--pink-l);color:var(--pink-d)}
.p-done{background:var(--teal-l);color:var(--teal-d)}
.row{display:flex;gap:6px;font-size:12px;color:var(--text2);margin-bottom:4px;align-items:flex-start}
.row i{font-size:13px;margin-top:1px;flex-shrink:0}
.lbl{color:var(--text3);min-width:42px}
.rec-date{font-size:10px;color:var(--text3);margin-top:5px}
.trade-imgs{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:8px 0}
.trade-img-box{border:1px solid var(--border);border-radius:var(--r);overflow:hidden;background:var(--surface2);position:relative}
.trade-img-box img{width:100%;aspect-ratio:1;object-fit:cover;display:block}
.trade-img-placeholder{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:11px;color:var(--text3)}
.trade-img-placeholder i{font-size:18px}
.trade-img-label{font-size:10px;font-weight:600;padding:2px 6px;position:absolute;top:0;left:0;border-radius:var(--r) 0 var(--r) 0}
.btn-sm{padding:4px 9px;border:1px solid var(--border2);border-radius:var(--r);font-size:11px;background:var(--surface);cursor:pointer;color:var(--text2);transition:all .15s}
.btn-sm:hover{border-color:var(--teal);color:var(--teal)}
.btn-del{padding:4px 10px;border:1px solid #E24B4A;border-radius:var(--r);background:transparent;cursor:pointer;color:#E24B4A;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:3px;transition:all .15s}
.btn-del:hover{background:#E24B4A;color:#fff}

/* フォーム */
.section-head{font-size:11px;font-weight:700;color:var(--text3);margin-bottom:7px;display:flex;align-items:center;gap:4px;text-transform:uppercase;letter-spacing:.06em}
.form-box{border:1px solid var(--border);border-radius:var(--rl);padding:12px;background:var(--surface2);margin-bottom:18px}
.flabel{font-size:11px;color:var(--text2);display:block;margin-bottom:3px;font-weight:500}
.frow{margin-bottom:8px}
.frow input,.frow textarea{width:100%;padding:7px 9px;font-size:13px;border:1px solid var(--border);border-radius:var(--r);background:var(--surface);color:var(--text);outline:none;font-family:inherit}
.frow textarea{resize:vertical;min-height:62px;line-height:1.6}
.frow input:focus,.frow textarea:focus{border-color:var(--pink)}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.f3{display:grid;grid-template-columns:1fr 1fr 2fr;gap:8px}

.stamp-modal{position:fixed;inset:0;background:#000;z-index:1000;display:flex;flex-direction:column;overflow:hidden}

.modal-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:rgba(20,20,18,0.95);flex-shrink:0;gap:8px}

function goTab(id,el){

// ===== 画像圧縮（保存容量節約） =====
// maxW/maxH: 最大解像度, quality: JPEG品質(0-1)
function compressImage(dataUrl, maxW, maxH, quality, callback){
  var img = new Image();
  img.onload = function(){
    var w = img.naturalWidth, h = img.naturalHeight;
    var ratio = Math.min(1, maxW/w, maxH/h);
    var cw = Math.round(w*ratio), ch = Math.round(h*ratio);
    var cv = document.createElement('canvas');
    cv.width=cw; cv.height=ch;
    var ctx = cv.getContext('2d');
    ctx.drawImage(img,0,0,cw,ch);
    callback(cv.toDataURL('image/jpeg', quality));
  };
  img.src = dataUrl;
}

// ===== カード追加 =====
function addCards(ev){
  Array.from(ev.target.files).forEach(f=>{
    var name=f.name.replace(/\.[^.]+$/,'');
    var r=new FileReader();
    r.onload=e=>{
      // 最大1200px、JPEG品質0.82で圧縮
      compressImage(e.target.result,1200,1200,0.82,function(compressed){
        S.cards.push({id:Date.now(),src:compressed,name:name,stamps:[],ts:Date.now()});
        renderCards(); scheduleSave();
      });
    };
    r.readAsDataURL(f);
  });
  ev.target.value='';
}

// ===== カード削除 =====
function deleteCard(cardId){
  cardId=Number(cardId);
  showConfirm('この画像を削除しますか？', function(){
    S.cards=S.cards.filter(c=>Number(c.id)!==cardId);
    renderCards(); scheduleSave();
  });
}

function showConfirm(msg, onOk){
  var old=document.getElementById('_confirm_overlay');
  if(old) old.remove();
  var ov=document.createElement('div');
  ov.id='_confirm_overlay';
  ov.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px';
  var box=document.createElement('div');
  box.style.cssText='background:var(--surface);border-radius:14px;padding:22px 20px;max-width:300px;width:100%;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.3)';
  var txt=document.createElement('p');
  txt.textContent=msg;
  txt.style.cssText='font-size:14px;color:var(--text);margin-bottom:18px;line-height:1.6';
  var btns=document.createElement('div');
  btns.style.cssText='display:flex;gap:10px;justify-content:center';
  var okBtn=document.createElement('button');
  okBtn.textContent='削除する';
  okBtn.style.cssText='padding:9px 22px;background:#E24B4A;color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;flex:1';
  okBtn.onclick=function(){ov.remove();onOk();};
  var cancelBtn=document.createElement('button');
  cancelBtn.textContent='キャンセル';
  cancelBtn.style.cssText='padding:9px 22px;background:var(--surface2);color:var(--text2);border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;flex:1';
  cancelBtn.onclick=function(){ov.remove();};
  btns.appendChild(cancelBtn);
  btns.appendChild(okBtn);
  box.appendChild(txt);
  box.appendChild(btns);
  ov.appendChild(box);
  document.body.appendChild(ov);
}

// ===== カード一覧描画 =====
function renderCards(){
  var g=document.getElementById('grid');
  if(!S.cards.length){
    g.innerHTML='<div class="empty" style="grid-column:1/-1">画像をアップロードして追加しよう</div>';
    return;
  }
  g.innerHTML=[...S.cards].sort((a,b)=>(b.ts||0)-(a.ts||0)).map(c=>{
    return `<div class="card">
      <button class="card-del-badge" title="削除" onclick="event.stopPropagation();deleteCard(${c.id})">✕</button>
      <div class="card-img-wrap" onclick="openStampModal(${c.id})">
        <img src="${c.src}" alt="${c.name}">
        <div class="stamp-layer">
          ${c.stamps.map(s=>`<span class="stamp-dot" style="left:${s.x}%;top:${s.y}%;font-size:${(s.sz||24)*0.6}px">${s.e}</span>`).join('')}
        </div>
      </div>
      <div class="card-foot">
        <span class="card-name-txt">${c.name}</span>
      </div>
    </div>`;
  }).join('');
}

function openStampModal(cardId){
  var card=S.cards.find(c=>c.id===cardId); if(!card) return;
  _modalCardId=cardId; _modalStamp=null;
  _mScale=1;_mTx=0;_mTy=0;_isPinching=false;_panMoved=false;
  document.getElementById('modal-img').src=card.src;
  document.getElementById('modal-card-name').textContent=card.name;
  document.getElementById('stamp-modal').classList.remove('hide');
  document.body.style.overflow='hidden';
  document.querySelectorAll('.mse').forEach(b=>b.classList.remove('on'));
  // viewport タッチイベント登録
  var vp=document.getElementById('modal-viewport');
  vp.ontouchstart=modalTouchStart;
  vp.ontouchmove=modalTouchMove;
  vp.ontouchend=modalTouchEnd;
  vp.onwheel=function(e){e.preventDefault();_mScale=Math.min(6,Math.max(0.3,_mScale*(e.deltaY>0?0.9:1.1)));applyTransform();};
  vp.onclick=modalViewportClick;
  var img=document.getElementById('modal-img');
  function init(){initScene();renderModalStamps(card);}
  img.onload=init;
  if(img.complete&&img.naturalWidth) init();

}

function initScene(){
  var vp=document.getElementById('modal-viewport');
  var img=document.getElementById('modal-img');
  var vpW=vp.clientWidth, vpH=vp.clientHeight;
  if(!vpH||vpH<10) vpH=Math.round(window.innerHeight*0.55);
  var nW=img.naturalWidth, nH=img.naturalHeight;
  if(!nW||!nH) return;
  var dispW,dispH;
  if(nW/vpW>nH/vpH){dispW=vpW;dispH=vpW*nH/nW;}
  else{dispH=vpH;dispW=vpH*nW/nH;}
  img.style.width=dispW+'px'; img.style.height=dispH+'px';
  var sc=document.getElementById('modal-scene');
  sc.style.width=dispW+'px'; sc.style.height=dispH+'px';
  sc.style.left='50%'; sc.style.top='50%';
  applyTransform();
}

function applyTransform(){
  var sc=document.getElementById('modal-scene');
  // scene は left:50%, top:50% で配置済み
  // translate(-50%,-50%) で中央合わせ → pan/zoom を適用
  sc.style.transformOrigin='50% 50%';
  sc.style.transform=
    'translate(-50%,-50%) translate('+_mTx+'px,'+_mTy+'px) scale('+_mScale+')';
}

function modalTouchStart(ev){
  if(ev.touches.length===2){
    _isPinching=true;_panStart=null;
    _pinchDist0=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    _pinchScale0=_mScale;
  } else if(ev.touches.length===1){
    _panStart={x:ev.touches[0].clientX,y:ev.touches[0].clientY};
    _panTx0=_mTx;_panTy0=_mTy;_panMoved=false;
  }
}
function modalTouchMove(ev){
  ev.preventDefault();
  if(ev.touches.length===2&&_pinchDist0!==null){
    var d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    _mScale=Math.min(6,Math.max(0.3,_pinchScale0*d/_pinchDist0));
    applyTransform();
  } else if(ev.touches.length===1&&_panStart&&!_isPinching){
    var dx=ev.touches[0].clientX-_panStart.x, dy=ev.touches[0].clientY-_panStart.y;
    if(Math.abs(dx)>4||Math.abs(dy)>4) _panMoved=true;
    _mTx=_panTx0+dx;_mTy=_panTy0+dy; applyTransform();
  }
}
function modalTouchEnd(ev){
  if(ev.touches.length<2) _pinchDist0=null;
  if(ev.touches.length===0){_panStart=null; setTimeout(()=>_isPinching=false,60);}
}

// スタンプ配置クリック（sceneのBCRを使って正確な%計算）
function modalViewportClick(ev){
  if(_modalStamp===null||_modalStamp==='erase') return;
  if(_isPinching||_panMoved) return;
  if(ev.target.classList.contains('modal-stamp-dot')) return;
  var sc=document.getElementById('modal-scene');
  var rect=sc.getBoundingClientRect(); // transform後の実画面座標
  var px=((ev.clientX-rect.left)/rect.width*100);
  var py=((ev.clientY-rect.top)/rect.height*100);
  // クリップ（0〜100の範囲内のみ）
  if(px<0||px>100||py<0||py>100) return;
  var card=S.cards.find(c=>c.id===_modalCardId); if(!card) return;
  var dot={e:EMOJIS[_modalStamp],x:parseFloat(px.toFixed(2)),y:parseFloat(py.toFixed(2)),sz:_stampSize,isNew:true};
  card.stamps.push(dot);
  renderModalStamps(card);
  scheduleSave();
}

// スタンプ削除
function stampClick(ev,idx){
  ev.stopPropagation();
  if(_modalStamp==='erase') doRemoveStamp(idx);
}
function stampPressStart(ev,idx){
  ev.stopPropagation();
  if(_modalStamp==='erase') return;
  _lpTimer=setTimeout(()=>doRemoveStamp(idx),600);
}
function stampPressEnd(ev){
  ev.stopPropagation();
  if(_lpTimer){clearTimeout(_lpTimer);_lpTimer=null;}
}

// スタンプのピンチ拡縮
function stampTouchStart(ev,idx){
  if(ev.touches.length===2){
    ev.stopPropagation();ev.preventDefault();
    _spActive=true;_spIdx=idx;
    _spDist0=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    var card=S.cards.find(c=>c.id===_modalCardId);
    _spSz0=card?(card.stamps[idx]?.sz||_stampSize):_stampSize;
  }
}
function stampTouchMove(ev){
  if(!_spActive) return;
  ev.stopPropagation();ev.preventDefault();
  if(ev.touches.length===2){
    var d=Math.hypot(ev.touches[0].clientX-ev.touches[1].clientX,ev.touches[0].clientY-ev.touches[1].clientY);
    var newSz=Math.round(Math.min(200,Math.max(12,_spSz0*d/_spDist0)));
    var card=S.cards.find(c=>c.id===_modalCardId); if(!card) return;
    if(card.stamps[_spIdx]) card.stamps[_spIdx].sz=newSz;
    var dots=document.querySelectorAll('.modal-stamp-dot');
    if(dots[_spIdx]) dots[_spIdx].style.fontSize=newSz+'px';
  }
}
function stampTouchEnd(ev){
  if(_spActive){ev.stopPropagation();_spActive=false;_spIdx=-1;scheduleSave();}
}

function doRemoveStamp(idx){
  var card=S.cards.find(c=>c.id===_modalCardId); if(!card) return;
  if(idx<0||idx>=card.stamps.length) return;
  card.stamps.splice(idx,1);
  renderModalStamps(card); scheduleSave();
}

function renderModalStamps(card){
  var layer=document.getElementById('modal-stamp-layer'); if(!layer) return;
  layer.innerHTML=card.stamps.map((s,i)=>{
    var sz=s.sz||_stampSize;
    var cls='modal-stamp-dot'+(s.isNew?' new':'');
    if(s.isNew){s.isNew=false;}
    return `<span class="${cls}" style="left:${s.x}%;top:${s.y}%;font-size:${sz}px"
      onclick="stampClick(event,${i})"
      onpointerdown="stampPressStart(event,${i})"
      onpointerup="stampPressEnd(event)"
      onpointercancel="stampPressEnd(event)"
      ontouchstart="stampTouchStart(event,${i})"
      ontouchmove="stampTouchMove(event)"
      ontouchend="stampTouchEnd(event)"
    >${s.e}</span>`;
  }).join('');
}

function setMSE(idx){
  _modalStamp=idx;
  document.querySelectorAll('.mse').forEach(b=>b.classList.remove('on'));
  var el=(idx==='erase')?document.getElementById('mse-erase'):document.getElementById('mse-'+idx);
  if(el) el.classList.add('on');
}
function updateStampSize(){
  var sl=document.getElementById('stamp-size-slider'); if(!sl) return;
  _stampSize=parseInt(sl.value);
  document.getElementById('stamp-size-val').textContent=_stampSize+'px';
}
function closeStampModal(){
  var card=S.cards.find(c=>c.id===_modalCardId);
  if(card) card.ts=Date.now();
  document.getElementById('stamp-modal').classList.add('hide');
  document.body.style.overflow='';
  _modalCardId=null;_modalStamp=null;
  renderCards(); scheduleSave();
}



// ===== 保存（プレビュー表示→長押し保存）=====
function saveStampedImage(){
  var card=S.cards.find(c=>c.id===_modalCardId); if(!card) return;
  var imgEl=document.getElementById('modal-img');
  var W=imgEl.naturalWidth||imgEl.offsetWidth;
  var H=imgEl.naturalHeight||imgEl.offsetHeight;
  if(!W||!H){alert('画像を読み込んでいます。少し待ってから再試行してください。');return;}
  var cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  var ctx=cv.getContext('2d');
  ctx.drawImage(imgEl,0,0,W,H);
  var dispW=parseFloat(document.getElementById('modal-scene').style.width)||W;
  var scaleR=W/dispW;
  card.stamps.forEach(s=>{
    var sz=(s.sz||_stampSize)*scaleR;
    ctx.font=sz+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(s.e,s.x/100*W,s.y/100*H);
  });
  // プレビュー表示（長押し→写真に追加 でカメラロールへ）
  var dataUrl=cv.toDataURL('image/png');
  showSavePreview(dataUrl,(card.name||'card')+'_stamped.png');
}

// ===== 2段アコーディオン =====
function buildMemoListHTML(memos,ctx){
  if(!memos.length) return '<div class="empty" style="padding:16px 0">まだ取引メモがありません</div>';
  var groups={};
  memos.forEach(m=>{
    var dk=m.tradeDate||'日付未設定';
    if(!groups[dk]) groups[dk]={live:m.live||'',memos:[]};
    if(m.live) groups[dk].live=m.live;
    groups[dk].memos.push(m);
  });
  var keys=Object.keys(groups).sort((a,b)=>{
    if(a==='日付未設定') return 1;
    if(b==='日付未設定') return -1;
    return a.localeCompare(b);
  });
  return keys.map(dk=>{
    var grp=groups[dk];
    var cnt=grp.memos.length;
    var live=grp.live?`<span class="dghd-live">— ${grp.live}</span>`:'';
    var dkId='dg-'+encodeURIComponent(dk)+'-'+ctx;
    var isOpen=openDates.has(dkId);
    var personsHTML=grp.memos.sort((a,b)=>a.ts-b.ts).map(m=>{
      var pid='pr-'+m.id;
      var pOpen=openPersons.has(pid);
      return `<div class="person-row">
        <div class="person-row-hd" onclick="togglePerson('${pid}')">
          
          <span class="prhd-name">${m.name}</span>
          ${m.uid?`<span class="prhd-uid">${m.uid}</span>`:''}
          <span class="prhd-pill ${m.status==='done'?'p-done':'p-ongoing'}">${m.status==='done'?'完了':'進行中'}</span>
          
        </div>
        <div class="person-detail${pOpen?' open':''}" id="pd-${m.id}">
          ${personDetailHTML(m,ctx)}
        </div>
      </div>`;
    }).join('');
    return `<div class="date-group">
      <div class="date-group-hd" onclick="toggleDate('${dkId}')">
        
        <span class="dghd-date">${dk}${live}</span>
        <span class="dghd-count">${cnt}件</span>
        
      </div>
      <div class="date-group-body${isOpen?' open':''}" id="dgbody-${dkId}">${personsHTML}</div>
    </div>`;
  }).join('');
}

  var giveBox=m.imgGive
    ?`<img src="${m.imgGive}" alt="もらう"><span class="trade-img-label lbl-receive">📥 もらう</span>`
    :'<div class="trade-img-placeholder"><span>画像なし</span></div>';
  var recvBox=m.imgReceive
    ?`<img src="${m.imgReceive}" alt="渡す"><span class="trade-img-label lbl-give">📤 渡す</span>`
    :'<div class="trade-img-placeholder"><span>画像なし</span></div>';
  var imgBlock=`<div class="trade-imgs">
    <div class="trade-img-box">${giveBox}</div>
    <div class="trade-img-box">${recvBox}</div>
  </div>`;
  return `<div class="memo-actions">
    <span class="pill ${m.status==='done'?'p-done':'p-ongoing'}">${m.status==='done'?'交換済み':'進行中'}</span>
    <button class="btn-sm" onclick="toggleStatus(${m.id},'${ctx}')">${m.status==='done'?'戻す':'完了にする'}</button>
    <button class="btn-sm" onclick="openEdit(${m.id},'${ctx}')"> 編集</button>
    <button class="btn-del" onclick="delMemo(${m.id},'${ctx}')">削除</button>
  </div>
  ${imgBlock}
  ${m.give?`<div class="row"><span class="lbl">もらう</span><span>${m.give}</span></div>`:''}
  ${m.receive?`<div class="row"><span class="lbl">渡す</span><span>${m.receive}</span></div>`:''}
  ${m.note?`<div class="row"><span class="lbl">メモ</span><span style="white-space:pre-line">${m.note}</span></div>`:''}
  <div class="rec-date">記録：${m.recDate}</div>`;
}

        <div class="fimg-box" id="ef-fib-give-${m.id}" onclick="trigFile('ef-fi-give-${m.id}')">${eG}</div>

function openEdit(mid,ctx){_editImgs[mid]={give:null,receive:null};var m=S.memos.find(x=>x.id===mid);if(!m)return;var el=document.getElementById('pd-'+mid);if(el)el.innerHTML=personEditHTML(m,ctx);}
function cancelEdit(mid,ctx){delete _editImgs[mid];var m=S.memos.find(x=>x.id===mid);if(!m)return;var el=document.getElementById('pd-'+mid);if(el)el.innerHTML=personDetailHTML(m,ctx);}
function setEditImg(mid,side,ev){var f=ev.target.files[0];if(!f)return;var r=new FileReader();r.onload=e=>{compressImage(e.target.result,800,800,0.80,function(compressed){if(!_editImgs[mid])_editImgs[mid]={give:null,receive:null};_editImgs[mid][side]=compressed;var box=document.getElementById('ef-fib-'+side+'-'+mid);var cap=side==='give'?'📥 もらう':'📤 渡す';var cls=side==='give'?'lbl-receive':'lbl-give';if(box){box.innerHTML='<img src="'+compressed+'" alt="'+side+'"><span class="fimg-cap '+cls+'">'+cap+'</span>';box.onclick=null;}});};r.readAsDataURL(f);ev.target.value='';}
function saveEdit(mid,ctx){var m=S.memos.find(x=>x.id===mid);if(!m)return;m.give=document.getElementById('ef-give-'+mid).value.trim();m.receive=document.getElementById('ef-receive-'+mid).value.trim();m.note=document.getElementById('ef-note-'+mid).value.trim();if(_editImgs[mid]){if(_editImgs[mid].give)m.imgGive=_editImgs[mid].give;if(_editImgs[mid].receive)m.imgReceive=_editImgs[mid].receive;}delete _editImgs[mid];var el=document.getElementById('pd-'+mid);if(el)el.innerHTML=personDetailHTML(m,ctx);scheduleSave();}

function toggleDate(dkId){
  var isOpen=openDates.has(dkId);
  if(isOpen)openDates.delete(dkId);else openDates.add(dkId);
  var body=document.getElementById('dgbody-'+dkId);
  var chev=document.getElementById('dgchev-'+dkId);
  if(body)body.classList.toggle('open',!isOpen);
  if(chev)chev.classList.toggle('open',!isOpen);
}
function togglePerson(pid){
  var mid=parseInt(pid.replace('pr-',''));
  var isOpen=openPersons.has(pid);
  if(isOpen)openPersons.delete(pid);else openPersons.add(pid);
  var det=document.getElementById('pd-'+mid);
  var chev=document.getElementById('pchev-'+mid);
  if(det)det.classList.toggle('open',!isOpen);
  if(chev)chev.classList.toggle('open',!isOpen);
}

function toggleStatus(id,ctx){
  var m=S.memos.find(x=>x.id===id);if(!m)return;
  m.status=(m.status==='done')?'ongoing':'done';
  refreshGlobalMemos();
  scheduleSave();
}
function delMemo(id,ctx){
  openPersons.delete('pr-'+id);
  S.memos=S.memos.filter(x=>x.id!==id);
  refreshGlobalMemos();
  scheduleSave();
}
function refreshGlobalMemos(){
  var el=document.getElementById('memo-list-global');if(!el)return;
  el.innerHTML=buildMemoListHTML(S.memos.filter(m=>!m.cardId),'global');
}

// フォーム
function trigFile(id){var el=document.getElementById(id);if(el)el.click();}
function setFImg(p,ev,side){
  var f=ev.target.files[0];if(!f)return;
  var r=new FileReader();
  r.onload=e=>{
    compressImage(e.target.result,800,800,0.80,function(compressed){
      _imgs[p][side]=compressed;
      var box=document.getElementById(p+'-fib-'+side);
      var cap=side==='give'?'📥 もらう':'📤 渡す';
      var cls=side==='give'?'lbl-receive':'lbl-give';
      if(box){box.innerHTML='<img src="'+compressed+'" alt="'+side+'"><span class="fimg-cap '+cls+'">'+cap+'</span>';box.onclick=null;}
    });
  };
  r.readAsDataURL(f);ev.target.value='';
}
function addMemo(cardId){
  var p=(cardId!==null)?'d':'g';
  var name=document.getElementById(p+'-name').value.trim();
  if(!name){document.getElementById(p+'-name').focus();return;}
  var raw=document.getElementById(p+'-date').value;
  var tradeDate=raw?new Date(raw).toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}):'';
  var live=document.getElementById(p+'-live').value.trim();
  var now=new Date();
  var recDate=now.toLocaleDateString('ja-JP')+' '+now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  var m={id:S.mc++,cardId:cardId,ts:now.getTime(),tradeDate:tradeDate,live:live,recDate:recDate,
    name:name,uid:document.getElementById(p+'-uid').value.trim(),
    imgGive:_imgs[p].give,imgReceive:_imgs[p].receive,
    give:document.getElementById(p+'-give').value.trim(),
    receive:document.getElementById(p+'-receive').value.trim(),
    note:document.getElementById(p+'-note').value.trim(),status:'ongoing'};
  S.memos.unshift(m);
  var dk=tradeDate||'日付未設定';
  openDates.add('dg-'+encodeURIComponent(dk)+'-global');
  openPersons.add('pr-'+m.id);
  _imgs[p]={give:null,receive:null};
  [p+'-name',p+'-uid',p+'-give',p+'-receive',p+'-note'].forEach(id=>{var el=document.getElementById(id);if(el)el.value='';});
  resetImgBox(p,'give');resetImgBox(p,'receive');
  refreshGlobalMemos();
  scheduleSave();
}
function resetImgBox(p,side){
  var box=document.getElementById(p+'-fib-'+side);
  if(box){box.innerHTML='<div class="fimg-empty">タップして追加</div>';box.onclick=function(){trigFile(p+'-fi-'+side);};}
}

// テンプレ
function addTmpl(){var t=document.getElementById('tt').value.trim(),b=document.getElementById('tb').value.trim();if(!t||!b)return;S.tmpls.unshift({id:S.tc++,title:t,body:b});document.getElementById('tt').value='';document.getElementById('tb').value='';renderTmpls();scheduleSave();}
function delTmpl(id){S.tmpls=S.tmpls.filter(x=>x.id!==id);renderTmpls();scheduleSave();}
function copyTmpl(id){var t=S.tmpls.find(x=>x.id===id);if(!t)return;navigator.clipboard.writeText(t.body).then(()=>{var el=document.getElementById('cfb'+id);if(el){el.style.display='inline';setTimeout(()=>el.style.display='none',1600);}});}
function renderTmpls(){
  var el=document.getElementById('tmpls');
  if(!S.tmpls.length){el.innerHTML='<div class="empty">テンプレがありません</div>';return;}
  el.innerHTML=S.tmpls.map(t=>`<div class="tmpl">
    <div class="tmpl-head">
      <span class="tmpl-title">${t.title}</span>
      <div style="display:flex;gap:5px;align-items:center">
        <span class="copy-ok" id="cfb${t.id}"> コピー済み</span>
        <button class="btn-sm" onclick="copyTmpl(${t.id})"> コピー</button>
        <button class="btn-del" onclick="delTmpl(${t.id})">削除</button>
      </div>
    </div>
    <div class="tmpl-body">${t.body}</div>
  </div>`).join('');
}

// localStorage
function saveToStorage(){
  try{
    var data=JSON.stringify({cards:S.cards,memos:S.memos,tmpls:S.tmpls,mc:S.mc,tc:S.tc});
    localStorage.setItem('tcm_v2',data);
  }catch(e){
    console.warn('save error:',e);
    try{
      var slim={cards:S.cards.map(function(c){return Object.assign({},c,{src:c.src||null});}),memos:S.memos,tmpls:S.tmpls,mc:S.mc,tc:S.tc};
      localStorage.setItem('tcm_v2',JSON.stringify(slim));
      alert('保存容量が不足しています。不要な画像を削除してください。');
    }catch(e2){
      alert('保存に失敗しました。不要な画像を削除してください。');
    }
  }
}
function loadFromStorage(){try{var d=localStorage.getItem('tcm_v2');if(d){var o=JSON.parse(d);if(o.cards)S.cards=o.cards;if(o.memos)S.memos=o.memos;if(o.tmpls)S.tmpls=o.tmpls;if(o.mc)S.mc=o.mc;if(o.tc)S.tc=o.tc;}}catch(e){console.warn('読込失敗:',e);}}
var _saveTimer=null;
function scheduleSave(){if(_saveTimer)clearTimeout(_saveTimer);_saveTimer=setTimeout(saveToStorage,500);}

// 初期化
loadFromStorage();
document.getElementById('g-date').value=new Date().toISOString().split('T')[0];
renderCards();refreshGlobalMemos();renderTmpls();
</script>

<script>
if('serviceWorker' in navigator){
  // インラインSWをBlobで登録
  var swCode = `
    var CACHE = 'tcm-v1';
    self.addEventListener('install', function(e){
      self.skipWaiting();
    });
    self.addEventListener('activate', function(e){
      clients.claim();
    });
    self.addEventListener('fetch', function(e){
      e.respondWith(fetch(e.request).catch(function(){
        return caches.match(e.request);
      }));
    });
  `;
  var blob = new Blob([swCode], {type:'text/javascript'});
  var swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(function(reg){
    console.log('SW registered');
  }).catch(function(e){
    console.log('SW error:', e);
  });
}
</script>

<script>
if('serviceWorker' in navigator){
  var swCode = `
    var CACHE='tcm-v1';
    var ASSETS=['/'];
    self.addEventListener('install',function(e){
      e.waitUntil(caches.open(CACHE).then(function(c){return c.addAll(ASSETS);}));
      self.skipWaiting();
    });
    self.addEventListener('activate',function(e){
      e.waitUntil(caches.keys().then(function(keys){
        return Promise.all(keys.filter(function(k){return k!==CACHE;}).map(function(k){return caches.delete(k);}));
      }));
      self.clients.claim();
    });
    self.addEventListener('fetch',function(e){
      e.respondWith(caches.match(e.request).then(function(r){return r||fetch(e.request);}));
    });
  `;
  var blob = new Blob([swCode],{type:'text/javascript'});
  var url = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).then(function(){
    console.log('SW registered');
  }).catch(function(e){
    console.log('SW failed:',e);
  });
}
</script>
